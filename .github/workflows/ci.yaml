name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  determine-changes:
    name: Determine changed files
    runs-on: ubuntu-latest
    outputs:
      github_actions: ${{ steps.changed-files.outputs.github_actions_any_changed }}
      github_actions_ci: ${{ steps.changed-files.outputs.github_actions_ci_any_changed }}
      renovate_config: ${{ steps.changed-files.outputs.renovate_config_any_changed }}
      nix: ${{ steps.changed-files.outputs.nix_any_changed }}
      sh_bash: ${{ steps.changed-files.outputs.sh_bash_any_changed }}
      zsh: ${{ steps.changed-files.outputs.zsh_any_changed }}
      md: ${{ steps.changed-files.outputs.md_any_changed }}
      json5: ${{ steps.changed-files.outputs.json5_any_changed }}
      json5_files: ${{ steps.changed-files.outputs.json5_all_changed_files }}
      toml: ${{ steps.changed-files.outputs.toml_any_changed }}
      yaml: ${{ steps.changed-files.outputs.yaml_any_changed }}
      python: ${{ steps.changed-files.outputs.python_any_changed }}

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            github_actions:
              - .github/workflows/**
            github_actions_ci:
              - .github/workflows/ci.yaml
            renovate_config:
              - .github/renovate.json5
            nix:
              - '**/*.nix'
              - flake.lock
            sh_bash:
              - '**/*.sh'
              - '**/*.bash'
            zsh:
              - '**/*.zsh'
            md:
              - '**/*.md'
              - .markdownlint-cli2.yaml
            json5:
              - '**/*.json5'
            toml:
              - '**/*.toml'
              - .tombi.toml
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - .yamllint.yaml
            python:
              - '**/*.py'
              - pyproject.toml
              - .python-version
              - uv.lock
              - .ruff.toml

  lint-gh-actions:
    name: Lint GitHub Actions
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.github_actions == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        if: github.event_name != 'pull_request'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Run actionlint (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 'v1.24.1'
          advanced-security: false
          annotations: true

      - name: Run zizmor (SARIF upload)
        if: >-
          ${{
            always() &&
            github.event.repository.private == false &&
            (github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository)
          }}
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 'v1.24.1'
          advanced-security: true

  validate-renovate-config:
    name: Validate Renovate config
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.renovate_config == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate Renovate config
        run: |
          npx --yes --package renovate@43.220.0 \
            renovate-config-validator .github/renovate.json5

  lint-nix:
    name: Lint Nix
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.nix == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect Nix files
        id: nix-files
        shell: bash
        run: |
          nix_files_path="$(mktemp)"
          find . -type f -name '*.nix' -not -path './.git/*' -print0 > "${nix_files_path}"
          echo "nix_files=${nix_files_path}" >> "$GITHUB_OUTPUT"
          if [ ! -s "${nix_files_path}" ]; then
            echo "No Nix files found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Nix format
        if: steps.nix-files.outputs.found == 'true'
        shell: bash
        env:
          NIX_FILES: ${{ steps.nix-files.outputs.nix_files }}
        run: xargs -0 nix fmt -- --check < "${NIX_FILES}"

      - name: Run statix
        run: nix run nixpkgs#statix -- check .

      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Run flake check
        run: |
          if [ -f flake.nix ]; then
            nix flake check --show-trace
          else
            echo "No flake.nix found. Skipping flake check."
          fi

  lint-sh-bash:
    name: Lint sh/Bash
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.sh_bash == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install shell tools
        shell: bash
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@2f3f5e36d9b0f8f14c998d50aa20a28832205ae8 # v3.13.1
          sudo apt-get update
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            sudo apt-get install -y shellcheck
          fi

      - name: Collect sh/bash files
        id: sh-bash-files
        shell: bash
        run: |
          sh_bash_files_path="$(mktemp)"
          find . -type f \( \
            -name '*.sh' -o \
            -name '*.bash' \
          \) -not -path './.git/*' -print0 > "${sh_bash_files_path}"
          echo "sh_bash_files=${sh_bash_files_path}" >> "$GITHUB_OUTPUT"
          if [ ! -s "${sh_bash_files_path}" ]; then
            echo "No sh/bash files found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shfmt
        if: steps.sh-bash-files.outputs.found == 'true'
        shell: bash
        env:
          SH_BASH_FILES: ${{ steps.sh-bash-files.outputs.sh_bash_files }}
        run: |
          xargs -0 "$(go env GOPATH)/bin/shfmt" --diff --simplify -i 2 < "${SH_BASH_FILES}"

      - name: Run shellcheck
        if: github.event_name != 'pull_request' && steps.sh-bash-files.outputs.found == 'true'
        shell: bash
        env:
          SH_BASH_FILES: ${{ steps.sh-bash-files.outputs.sh_bash_files }}
        run: |
          xargs -0 shellcheck --external-sources < "${SH_BASH_FILES}"

      - name: Run shellcheck (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          pattern: |
            *.sh
            *.bash

  lint-zsh:
    name: Lint Zsh
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.zsh == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Zsh tools
        shell: bash
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@2f3f5e36d9b0f8f14c998d50aa20a28832205ae8 # v3.13.1
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Collect Zsh files
        id: zsh-files
        shell: bash
        run: |
          zsh_files_path="$(mktemp)"
          find . -type f -name '*.zsh' -not -path './.git/*' -print0 > "${zsh_files_path}"
          echo "zsh_files=${zsh_files_path}" >> "$GITHUB_OUTPUT"
          if [ ! -s "${zsh_files_path}" ]; then
            echo "No Zsh files found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shfmt
        if: steps.zsh-files.outputs.found == 'true'
        shell: bash
        env:
          ZSH_FILES: ${{ steps.zsh-files.outputs.zsh_files }}
        run: |
          xargs -0 "$(go env GOPATH)/bin/shfmt" --language-dialect zsh --diff --simplify -i 2 < "${ZSH_FILES}"

      - name: Check Zsh syntax
        if: steps.zsh-files.outputs.found == 'true'
        shell: bash
        env:
          ZSH_FILES: ${{ steps.zsh-files.outputs.zsh_files }}
        run: |
          xargs -0 -n 1 zsh -n < "${ZSH_FILES}"

  lint-markdown:
    name: Lint Markdown
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.md == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint Markdown
        if: github.event_name != 'pull_request'
        run: npx --yes markdownlint-cli2@0.22.1 .

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint Markdown (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          markdownlint_rc=0
          npx --yes markdownlint-cli2@0.22.1 . > /tmp/markdownlint-report.txt 2>&1 || markdownlint_rc=$?
          reviewdog_rc=0
          reviewdog < /tmp/markdownlint-report.txt \
              -efm="%f:%l:%c %m" \
              -efm="%f:%l %m" \
              -name=markdownlint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $markdownlint_rc -ne 0 ] && ! grep -Eq '^[^:]+:[0-9]+(:[0-9]+)? ' /tmp/markdownlint-report.txt; then
            echo "::error title=markdownlint::markdownlint failed before producing parseable diagnostics"
            exit $markdownlint_rc
          fi
          exit $reviewdog_rc

  lint-json5:
    name: Lint JSON5
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.json5 == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check JSON5 syntax
        env:
          CHANGED_JSON5_FILES: ${{ needs.determine-changes.outputs.json5_files }}
        run: |
          readarray -t json5_files < <(
            printf '%s\n' "${CHANGED_JSON5_FILES}" | tr ' ' '\n' | sed '/^$/d'
          )
          if [ ${#json5_files[@]} -eq 0 ]; then
            readarray -d '' -t json5_files < <(
              find . -type f -name '*.json5' -not -path './.git/*' -print0
            )
          fi
          if [ ${#json5_files[@]} -eq 0 ]; then
            echo 'No JSON5 files found.'
            exit 0
          fi
          exit_code=0
          for json5_file in "${json5_files[@]}"; do
            npx --yes json5@2.2.3 --validate "$json5_file" || exit_code=1
          done
          exit $exit_code

  lint-toml:
    name: Lint TOML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.toml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Tombi
        uses: tombi-toml/setup-tombi@90dc1ab19ff45cc28017aab8cd0093516d908532 # v1.1.5
        with:
          version: '1.1.5'

      - name: Lint TOML
        if: github.event_name != 'pull_request'
        run: tombi lint

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint TOML (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_COLOR: '1'
        run: |
          lint_rc=0
          tombi lint --quiet > /tmp/tombi-lint-report.txt 2>&1 || lint_rc=$?
          gawk '
            match($0, /^[[:space:]]*(Warning|Error):[[:space:]]*(.*)$/, m) {
              severity = m[1]; message = m[2]; next
            }
            match($0, /^[[:space:]]*at[[:space:]]+(.*):([0-9]+):([0-9]+)/, m) {
              printf "%s:%s:%s: %s: %s\n", m[1], m[2], m[3], substr(severity, 1, 1), message
            }
          ' /tmp/tombi-lint-report.txt > /tmp/tombi-lint-report.efm.txt
          reviewdog_rc=0
          reviewdog < /tmp/tombi-lint-report.efm.txt \
              -efm="%f:%l:%c: %t: %m" \
              -name=tombi-lint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $lint_rc -ne 0 ] && [ ! -s /tmp/tombi-lint-report.efm.txt ]; then
            echo "::error title=tombi::tombi lint failed before producing parseable diagnostics"
            cat /tmp/tombi-lint-report.txt
            exit $lint_rc
          fi
          exit $reviewdog_rc

      - name: Format TOML
        run: tombi format

      - name: Suggest TOML format changes (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.24.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: tombi-format
          cleanup: 'false'

      - name: Check TOML format
        run: git diff --exit-code

  lint-yaml:
    name: Lint YAML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.yaml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        if: github.event_name != 'pull_request'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: '0.11.24'

      - name: Lint YAML
        if: github.event_name != 'pull_request'
        run: uvx --from "yamllint==1.38.0" yamllint .

      - name: Lint YAML (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-yamllint@b5f7217d8c815ae374d1d55840d5e569d82f01f0 # v1.22.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          yamllint_flags: .

  lint-python:
    name: Lint Python
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.python == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: '0.11.24'

      - name: Lint with Ruff
        if: github.event_name != 'pull_request'
        run: uvx --from "ruff==0.15.19" ruff check . --output-format=github

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint with Ruff (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff_rc=0
          uvx --from "ruff==0.15.19" ruff check . --output-format=json > /tmp/ruff-report.json || ruff_rc=$?
          reviewdog_rc=0
          jq -c '
            .[] |
            {
              source: {name: "ruff"},
              severity: "ERROR",
              message: (.message + " (" + .code + ")"),
              location: {
                path: .filename,
                range: {
                  start: {line: .location.row, column: .location.column},
                  end: {
                    line: (.end_location.row // .location.row),
                    column: (.end_location.column // .location.column)
                  }
                }
              }
            }
          ' /tmp/ruff-report.json > /tmp/ruff-rdjsonl.txt || true
          reviewdog < /tmp/ruff-rdjsonl.txt \
              -f=rdjsonl \
              -name=ruff \
              -reporter=github-pr-review \
              -fail-level=error \
              -tee || reviewdog_rc=$?
          if [ $ruff_rc -ne 0 ] && [ ! -s /tmp/ruff-rdjsonl.txt ]; then
            echo "::error title=ruff::ruff failed before producing diagnostics for reviewdog"
            exit $ruff_rc
          fi
          exit $reviewdog_rc

  check-prek:
    name: Check prek
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check prek
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          prek-version: 'v0.4.5'
          extra-args: '--all-files --skip no-commit-to-branch'

  check-typos:
    name: Check typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check spelling
        if: github.event_name != 'pull_request'
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

      - name: Check spelling (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98 # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          typos_flags: .

  # lint-commit-messages:
  #   name: Lint commit messages
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout the main repository
  #       uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  #       with:
  #         fetch-depth: 0
  #         persist-credentials: false

  #     - name: Set up Commitizen
  #       uses: commitizen-tools/setup-cz@96c75e6ae9632047f2c9b4025b9dd1624b40de8f # v0.9.1
  #       with:
  #         python-version: '3.x'
  #         version: '4.16.3'

